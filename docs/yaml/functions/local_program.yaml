name: local_program
returns: external_program | local_program
description: |
  Similar to [[find_program]], but only work with a local program
  (source or build tree) that exists at configure time. The program will not be
  looked on the system or from subproject overrides.

  In addition, `depends` and `depend_files` keyword arguments can be specified
  in the case the program depends on built targets. For example a python script
  that requires a compiled C module. When specified, the program can only be used
  in build-time commands (e.g. [[custom_target]]).

  The program can be passed to [[meson.override_find_program]] and used in
  subprojects.

posargs:
  program:
    type: str | file
    description: |
      A [[@file]] object or the name of a program in the current source directory.

kwargs:
  depend_files:
    type: array[str | file]
    description: |
      files ([[@str]],
      [[@file]], or the return value of [[configure_file]] that
      this target depends on. Useful for adding regen dependencies.

  depends:
    type: array[build_tgt | custom_tgt | custom_idx]
    description: |
      Specifies that this target depends on the specified
      target(s). If specified, this program can only be used at build time,
      after those targets have been built.
